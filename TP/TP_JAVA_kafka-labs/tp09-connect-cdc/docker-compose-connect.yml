---
# ============================================================
#  TP09 — Docker Compose : Kafka Connect + MySQL + phpMyAdmin
# ============================================================
#
#  LANCER :
#  > docker compose -f docker-compose-connect.yml up -d
#
#  ACCÈS :
#  - Kafka Connect REST : http://localhost:8083
#  - Kafka UI           : http://localhost:8080
#  - phpMyAdmin         : http://localhost:8090
#    (login : root / rootpass)
#
#  ARRÊTER :
#  > docker compose -f docker-compose-connect.yml down -v
# ============================================================

version: "3.8"

services:

  # ── Broker Kafka KRaft ────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: tp09-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 15

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    hostname: mysql
    container_name: tp09-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shopdb
      MYSQL_USER: kafka_user
      MYSQL_PASSWORD: kafka_pass
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: mysqladmin ping -h localhost -u root -prootpass
      interval: 10s
      timeout: 5s
      retries: 20

  # ── phpMyAdmin ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: tp09-phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8090:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpass

  # ── Kafka Connect (avec connecteurs JDBC + Debezium) ──────────────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    hostname: kafka-connect
    container_name: tp09-kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_REST_PORT: "8083"
      CONNECT_GROUP_ID: "tp09-connect-group"
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      # Installer les connecteurs au démarrage
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    command:
      - bash
      - -c
      - |
        echo "Installation des connecteurs..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:10.7.4
        confluent-hub install --no-prompt debezium/debezium-connector-mysql:2.4.2
        echo "Démarrage de Kafka Connect..."
        /etc/confluent/docker/run
    healthcheck:
      test: curl -f http://localhost:8083/
      interval: 15s
      timeout: 10s
      retries: 20

  # ── Kafka UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tp09-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "tp09-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: "tp09-connect"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://kafka-connect:8083"

volumes:
  mysql-data:
